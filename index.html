<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Elysian Library</title>

<meta name="description" content="The Elysian Library is a peaceful female-only study space in Quetta near Hazara Town offering quiet environment, WiFi, and secure study area.">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", sans-serif;
}

body{
background:#0f172a;
color:white;
line-height:1.6;
}

/* HERO */

.hero{
height:85vh;
background:
linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
url('/TheElysian-library-/images/library.jpg') center/cover no-repeat;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}

/* ABOUT BG */

#about{
background:
linear-gradient(rgba(15,23,42,0.9), rgba(15,23,42,0.9)),
url('/TheElysian-library-/images/about.jpg') center/cover no-repeat;
}

/* GALLERY BG */

#gallery{
background:
linear-gradient(rgba(15,23,42,0.9), rgba(15,23,42,0.9)),
url('/TheElysian-library-/images/gallery-bg.jpg') center/cover no-repeat;
}

/* GALLERY IMAGES */

.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

</style>
</head>

<body>

<div class="hero">
<h1>The Elysian Library</h1>
</div>

<section id="about">
<h2>About</h2>
<p>Peaceful study space for female students.</p>
</section>

<section id="gallery">

<h2>Gallery</h2>

<div class="gallery">
<img src="/TheElysian-library-/images/library.jpg">
<img src="/TheElysian-library-/images/study1.jpg">
<img src="/TheElysian-library-/images/study2.jpg">
<img src="/TheElysian-library-/images/terrace.jpg">
</div>

</section>

</body>

</html>
